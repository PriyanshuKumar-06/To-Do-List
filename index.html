<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TO-DO list</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="title">
            TO DO LIST
        </div>
        <div class="type">
            <input type="text" placeholder="Type your tasks" class="add">
            <button id = "addbutt">Add</button>
        </div> 
    </header>   
    <main>
        <div class="container">
            <div class="task"> 
                <input type="checkbox" class="checkbox">
                <p class="info">I need to do my homework</p>
                <span class = "remove"><img src="assets\icons8-delete-30.png" alt="bin"></span>
            </div>
        </div>
    </main>
<script src="script.js"></script>
</body>
</html>
